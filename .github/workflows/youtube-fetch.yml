name: YouTube Latest Videos Fetcher

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: "YouTube channel URL or handle"
        required: true
        default: "@Vsauce"

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetcher
        env:
          CHANNEL_URL: ${{ github.event.inputs.channel_url }}
        run: |
          python -m src.main

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: youtube-output
          path: output/
